name: Deploy AlgoBattle

on: 
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}  
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.PRIVATE_SSH_KEY }}    
          port: 22
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            cd ~/apps/algo-battle
            git fetch origin     
            git reset --hard origin/main
            source $HOME/.cargo/env  
            cargo build --release
            pm2 restart algobattle-backend || pm2 start ./target/release/backend --name algobattle-backend
            pm2 restart algobattle-ws || pm2 start ./target/release/ws --name algobattle-ws
            pm2 save